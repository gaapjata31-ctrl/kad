<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>論文ドリル｜特別区課題式論文</title>
<style>
  :root{
    --ink:#1b2440; --bg:#f4f6fd; --card:#ffffff;
    --primary:#3b5bdb; --primary-soft:#e7ecfd;
    --ok:#0ca678; --ok-soft:#e6f8f2;
    --ng:#e8590c; --ng-soft:#fdeee4;
    --rule:#e2e6f2; --faint:#7a83a3;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    font-family:"Hiragino Sans","Yu Gothic",system-ui,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.75;
    padding-bottom:92px;
  }
  header{
    background:linear-gradient(135deg,#3b5bdb 0%,#5f3dc4 100%);
    color:#fff; padding:16px 16px 12px;
    position:sticky; top:0; z-index:10;
    box-shadow:0 2px 10px rgba(59,91,219,.25);
  }
  header h1{
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
    font-size:1.15rem; letter-spacing:.12em; font-weight:600;
  }
  header .sub{font-size:.68rem; opacity:.85; letter-spacing:.05em; margin-top:1px;}
  .modes{display:flex; gap:0; margin-top:11px; border:1.5px solid rgba(255,255,255,.7); border-radius:10px; overflow:hidden;}
  .modes button{
    flex:1; border:none; background:transparent; color:#fff;
    font-family:inherit; font-size:.85rem; font-weight:600; letter-spacing:.1em;
    padding:8px 0; cursor:pointer;
  }
  .modes button.on{background:#fff; color:var(--primary);}
  .progress{margin-top:11px;}
  .progress .row{
    display:flex; justify-content:space-between; align-items:baseline;
    font-size:.75rem; margin-bottom:4px;
  }
  .progress .pct{font-size:1.02rem; font-weight:700; font-variant-numeric:tabular-nums;}
  .bar{height:9px; background:rgba(255,255,255,.25); border-radius:999px; overflow:hidden;}
  .bar i{
    display:block; height:100%; width:0%;
    background:linear-gradient(90deg,#63e6be,#38d9a9);
    border-radius:999px; transition:width .5s cubic-bezier(.2,.8,.2,1);
  }
  .stats{
    display:flex; gap:14px; margin-top:8px; font-size:.74rem;
    font-variant-numeric:tabular-nums; opacity:.95;
  }
  .stats b{font-weight:700;}
  .saved{font-size:.64rem; opacity:.7; margin-top:3px; min-height:1em; letter-spacing:.05em;}
  .chips{
    display:flex; gap:8px; overflow-x:auto; padding:10px 16px;
    background:var(--bg); position:sticky; top:var(--hh,170px); z-index:9;
    -webkit-overflow-scrolling:touch; scrollbar-width:none;
    border-bottom:1px solid var(--rule);
  }
  .chips::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto; border:1.5px solid var(--cc,var(--primary));
    background:var(--card); color:var(--cc,var(--primary));
    font-size:.78rem; padding:5px 13px; border-radius:999px;
    letter-spacing:.03em; cursor:pointer; font-family:inherit; font-weight:600;
  }
  .chip.on{background:var(--cc,var(--primary)); color:#fff;}
  main{padding:14px 16px 20px; max-width:720px; margin:0 auto;}
  .card{
    background:var(--card); border-radius:14px; margin-bottom:14px;
    border-left:5px solid var(--cc,var(--primary));
    box-shadow:0 1px 4px rgba(27,36,64,.08); overflow:hidden;
  }
  .card.st-ok{background:linear-gradient(0deg,var(--ok-soft),var(--card) 55%);}
  .card.st-ng{background:linear-gradient(0deg,var(--ng-soft),var(--card) 55%);}
  .card .head{
    display:flex; justify-content:space-between; align-items:center;
    padding:8px 14px 0; font-size:.7rem; letter-spacing:.06em;
  }
  .card .head .cat{color:var(--cc,var(--primary)); font-weight:700;}
  .card .head .no{color:var(--faint); font-variant-numeric:tabular-nums;}
  .card .head .res{font-size:.95rem; font-weight:700; margin-left:6px;}
  .res.ok{color:var(--ok);} .res.ng{color:var(--ng);}
  .card .body{
    padding:10px 14px 12px;
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
    font-size:1.02rem; line-height:2.05;
  }
  .orig{color:var(--faint); font-size:.92em;}
  .blank{
    display:inline-block; white-space:nowrap; vertical-align:baseline;
    border-bottom:2px solid var(--primary); padding:0 2px; margin:0 1px;
  }
  .blank .sq{
    display:inline-block; width:1.05em; height:1.15em; margin:0 .5px;
    border:1px solid var(--rule); background:var(--primary-soft);
    border-radius:3px; vertical-align:-.18em;
  }
  .blank .ch{display:inline-block; width:1.05em; text-align:center; color:var(--primary); font-weight:600;}
  .blank.open{
    background:var(--primary-soft); border-bottom-color:var(--primary);
    color:var(--primary); font-weight:600; border-radius:4px;
  }
  .blank.open .sq{display:none;}
  .card .foot{display:flex; border-top:1px solid var(--rule);}
  .card .foot button{
    flex:1; border:none; background:transparent; font-family:inherit;
    font-size:.85rem; padding:11px 0; letter-spacing:.08em; color:var(--ink);
    cursor:pointer; font-weight:600;
  }
  .card .foot button + button{border-left:1px solid var(--rule);}
  .card .foot button:disabled{color:var(--rule);}
  .card .foot button:active{background:var(--bg);}
  .card .foot .j-ok{color:var(--ok);}
  .card .foot .j-ng{color:var(--ng);}
  .judge{display:none;} .card.revealed .judge{display:flex;}
  .card.revealed .ops{display:none;}
  .ops{display:flex; flex:1;}
  .empty{text-align:center; color:var(--faint); font-size:.85rem; padding:48px 0;}
  .guide{
    background:var(--primary-soft); border-radius:14px; margin-bottom:14px;
    border-left:5px solid var(--primary); overflow:hidden;
  }
  .guide summary{
    list-style:none; cursor:pointer; padding:11px 14px;
    font-size:.85rem; font-weight:700; color:var(--primary); letter-spacing:.05em;
  }
  .guide summary::-webkit-details-marker{display:none;}
  .guide summary::before{content:"▶ ";}
  .guide[open] summary::before{content:"▼ ";}
  .guide .gbody{
    padding:0 14px 13px; font-size:.82rem; line-height:1.9; color:var(--ink);
  }
  .guide .gbody h4{
    font-size:.8rem; margin:8px 0 3px; color:var(--primary); letter-spacing:.05em;
  }
  .guide .gbody dl{margin:0;}
  .guide .gbody dt{font-weight:700; margin-top:5px;}
  .guide .gbody dd{margin:0; color:#3a4364;}
  .guide .gbody .rule{margin-top:3px;}
  .guide .gbody .rule b{color:var(--primary);}
  footer{
    position:fixed; bottom:0; left:0; right:0;
    background:var(--card); border-top:1px solid var(--rule);
    display:flex; gap:8px; padding:10px 16px calc(10px + env(safe-area-inset-bottom));
    z-index:10; box-shadow:0 -2px 10px rgba(27,36,64,.06);
  }
  footer button{
    flex:1; font-family:inherit; font-size:.83rem; letter-spacing:.1em;
    padding:11px 0; border:1.5px solid var(--primary); border-radius:10px;
    background:var(--card); color:var(--primary); cursor:pointer; font-weight:600;
  }
  footer button.on{background:var(--primary); color:#fff;}
  footer button.danger{border-color:var(--ng); color:var(--ng);}
  footer button:active{opacity:.7;}
  .note{font-size:.7rem; color:var(--faint); text-align:center; padding:4px 16px 12px;}
</style>
</head>
<body>

<header id="hd">
  <h1>論文ドリル</h1>
  <div class="sub">特別区課題式論文｜模範答案・レジュメ全収録分より抽出</div>
  <div class="modes" id="modes">
    <button data-m="phrase" class="on">言い回し</button>
    <button data-m="particle">てにをは</button>
    <button data-m="de">で言い換え</button>
  </div>
  <div class="progress">
    <div class="row">
      <span class="pct"><span id="pPct">0</span>%</span>
      <span class="msg" id="pMsg">さあ始めよう</span>
    </div>
    <div class="bar"><i id="pBar"></i></div>
  </div>
  <div class="stats">
    <span>全 <b id="stTotal">0</b> 問</span>
    <span>○ <b id="stOk">0</b></span>
    <span>× <b id="stNg">0</b></span>
    <span>未 <b id="stRest">0</b></span>
  </div>
  <div class="saved" id="savedMsg"></div>
</header>

<div class="chips" id="chips"></div>

<main id="list"></main>
<div class="note" id="envNote"></div>

<footer>
  <button id="btnShuffle">シャッフル</button>
  <button id="btnReview">×のみ</button>
  <button id="btnReset" class="danger">リセット</button>
</footer>

<script>
// [モード, カテゴリ, 文] 【】内が空欄。ID順は変更しない(保存データ互換のため末尾追記方式)
const DATA=[

/* ===== 進捗セーブ層 =====
   1) window.storage (Claude アーティファクト環境)
   2) localStorage   (GitHub Pages 等の通常ブラウザ)
   3) メモリのみ                                     */
const KEY="ronbun-phrase-drill-v1";
let storageMode="memory";
async function detectStorage(){
  if(typeof window.storage!=="undefined"&&window.storage&&window.storage.set){
    storageMode="claude"; return;
  }
  try{
    localStorage.setItem(KEY+"-t","1"); localStorage.removeItem(KEY+"-t");
    storageMode="local";
  }catch(e){ storageMode="memory"; }
}
async function saveProgress(){
  const payload=JSON.stringify({
    states:items.filter(i=>i.state!=="none").map(i=>({id:i.id,s:i.state})),
    at:new Date().toISOString()
  });
  try{
    if(storageMode==="claude"){ await window.storage.set(KEY,payload); }
    else if(storageMode==="local"){ localStorage.setItem(KEY,payload); }
    else{ return; }
    showSaved();
  }catch(e){}
}
async function loadProgress(){
  let raw=null;
  try{
    if(storageMode==="claude"){
      const r=await window.storage.get(KEY); raw=r?r.value:null;
    }else if(storageMode==="local"){
      raw=localStorage.getItem(KEY);
    }
  }catch(e){ raw=null; }
  if(!raw) return;
  try{
    const p=JSON.parse(raw);
    p.states.forEach(s=>{
      const it=items.find(i=>i.id===s.id);
      if(it&&(s.s==="ok"||s.s==="ng")) it.state=s.s;
    });
  }catch(e){}
}
async function clearProgress(){
  try{
    if(storageMode==="claude"){ await window.storage.delete(KEY); }
    else if(storageMode==="local"){ localStorage.removeItem(KEY); }
  }catch(e){}
}
let savedTimer=null;
function showSaved(){
  const el=document.getElementById("savedMsg");
  const t=new Date();
  el.textContent="保存済み "+t.getHours()+":"+String(t.getMinutes()).padStart(2,"0");
  clearTimeout(savedTimer);
  savedTimer=setTimeout(()=>{el.textContent="";},3000);
}

const esc=s=>s.replace(/&/g,"&amp;").replace(/</g,"&lt;");

function blanksOf(it){
  return [...it.raw.matchAll(/【([^】]+)】/g)].map(m=>m[1]);
}
function renderSentence(it){
  return it.raw.split("\n").map(line=>{
    const inner=line.split(/(【[^】]+】)/).map(p=>{
      const m=p.match(/^【(.+)】$/);
      if(!m) return esc(p);
      const ans=m[1];
      if(it.revealed) return '<span class="blank open">'+esc(ans)+'</span>';
      const chars=[...ans];
      const sq=chars.map((c,i)=>{
        // 2文字以上の空欄のみヒント表示(1文字助詞は答えそのものになるため)
        if(i===0&&it.hinted&&chars.length>=2) return '<span class="ch">'+esc(c)+'</span>';
        return '<span class="sq"></span>';
      }).join("");
      return '<span class="blank">'+sq+'</span>';
    }).join("");
    return line.startsWith("△")?'<span class="orig">'+inner+'</span>':inner;
  }).join("<br>");
}

function visible(){
  return items.filter(it=>
    it.mode===curMode&&
    (curCat==="all"||it.cat===curCat)&&
    (!reviewOnly||it.state==="ng"));
}

    g.addEventListener("toggle",()=>{guideOpen=g.open;});
  }
  if(!vis.length){list.insertAdjacentHTML("beforeend",'<div class="empty">該当する問題はありません。</div>');}
  vis.forEach((it,idx)=>{
    const c=document.createElement("div");
    const col=catColor(it.cat);
    c.className="card"+(it.revealed?" revealed":"")+(it.state!=="none"?" st-"+it.state:"");
    c.style.setProperty("--cc",col);
    const res=it.state==="ok"?'<span class="res ok">○</span>':it.state==="ng"?'<span class="res ng">×</span>':"";
    // 全空欄が1文字ならヒント不可
    const hintable=blanksOf(it).some(a=>[...a].length>=2);
    c.innerHTML=
      '<div class="head"><span class="cat">'+esc(it.cat)+'</span><span class="no">'+(idx+1)+' / '+vis.length+res+'</span></div>'+
      '<div class="body">'+renderSentence(it)+'</div>'+
      '<div class="foot">'+
        '<div class="ops" style="display:'+(it.revealed?'none':'flex')+'">'+
          '<button data-a="hint" data-id="'+it.id+'"'+((it.hinted||!hintable)?" disabled":"")+'>ヒント（頭文字）</button>'+
          '<button data-a="open" data-id="'+it.id+'">答えを見る</button>'+
        '</div>'+
        '<div class="judge" style="display:'+(it.revealed?'flex':'none')+'">'+
          '<button class="j-ok" data-a="ok" data-id="'+it.id+'">○ 言えた</button>'+
          '<button class="j-ng" data-a="ng" data-id="'+it.id+'">× 言えなかった</button>'+
        '</div>'+
      '</div>';
    list.appendChild(c);
  });
  const pool=items.filter(i=>i.mode===curMode);
  const total=pool.length;
  const ok=pool.filter(i=>i.state==="ok").length;
  const ng=pool.filter(i=>i.state==="ng").length;
  $("#stTotal").textContent=total;
  $("#stOk").textContent=ok;
  $("#stNg").textContent=ng;
  $("#stRest").textContent=total-ok-ng;
  const pct=total?Math.round(ok/total*100):0;
  $("#pPct").textContent=pct;
  $("#pBar").style.width=pct+"%";
  $("#pMsg").textContent=progressMsg(pct);
}

list.addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b)return;
  const it=items.find(i=>i.id==b.dataset.id); if(!it)return;
  const a=b.dataset.a;
  if(a==="hint")it.hinted=true;
  if(a==="open")it.revealed=true;
  if(a==="ok"||a==="ng"){it.state=a;it.revealed=true;saveProgress();}
  render();
});

function buildChips(){
  const all=["all",...catsOf(curMode)];
  chipsEl.innerHTML=all.map(c=>{
    const col=c==="all"?"#1b2440":catColor(c);
    return '<button class="chip'+(c===curCat?" on":"")+'" style="--cc:'+col+'" data-c="'+esc(c)+'">'+(c==="all"?"すべて":esc(c))+'</button>';
  }).join("");
}
chipsEl.addEventListener("click",e=>{
  const b=e.target.closest(".chip"); if(!b)return;
  curCat=b.dataset.c; buildChips(); render();
  window.scrollTo({top:0});
});
document.getElementById("modes").addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b)return;
  curMode=b.dataset.m; curCat="all";
  document.querySelectorAll("#modes button").forEach(x=>x.classList.toggle("on",x.dataset.m===curMode));
  buildChips(); render();
  window.scrollTo({top:0});
});

$("#btnShuffle").onclick=()=>{
  for(let i=items.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [items[i],items[j]]=[items[j],items[i]];
  }
  items.forEach(i=>{i.hinted=false;i.revealed=false;});
  render(); window.scrollTo({top:0});
};
$("#btnReview").onclick=function(){
  reviewOnly=!reviewOnly;
  this.classList.toggle("on",reviewOnly);
  render(); window.scrollTo({top:0});
};
$("#btnReset").onclick=()=>{
  if(!confirm("採点結果をすべて消去します（全モード）。よろしいですか?"))return;
  items.forEach(i=>{i.state="none";i.hinted=false;i.revealed=false;});
  reviewOnly=false; $("#btnReview").classList.remove("on");
  clearProgress(); render();
};

(async()=>{
  await detectStorage();
  await loadProgress();
  const note=$("#envNote");
  if(storageMode==="memory"){
    note.textContent="※ この環境では保存機能が使えないため、進捗はページを閉じるとリセットされます。";
  }else{
    note.textContent="○×の採点結果は自動保存され、次回開いたときに復元されます。";
  }
  document.documentElement.style.setProperty("--hh",$("#hd").offsetHeight+"px");
  buildChips(); render();
})();
</script>
</body>
</html>
